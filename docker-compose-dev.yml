services:

  # ── Infrastructure ──────────────────────────────────────────────

  traefik:
    image: traefik:v3.3
    container_name: SD-traefik_dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
    networks:
      - sd_internal
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: SD-cloudflared_dev
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - sd_internal
    depends_on:
      - traefik
    restart: unless-stopped

  # ── Data layer ───────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: SD-pgdb_dev
    env_file: .env.dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./ini:/docker-entrypoint-initdb.d:ro
    networks:
      - sd_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: SD-minio_dev
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    env_file: .env.dev
    networks:
      - sd_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application layer ────────────────────────────────────────────

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
      target: development
    container_name: SD-auth_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env.dev
    volumes:
      - ./auth:/app
    networks:
      - sd_internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Route: /auth/* → auth service
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
      # The /auth/verify route must NOT self-protect (infinite loop)
      # so we strip it from the forwardauth middleware via a separate router:
      - "traefik.http.routers.auth-verify.rule=Path(`/auth/verify`)"
      - "traefik.http.routers.auth-verify.entrypoints=web"
      - "traefik.http.routers.auth-verify.priority=10"   # higher = matched first

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
      target: development
    container_name: SD-core_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env.dev
    volumes:
      - ./core:/app
      - ./frontend/dist:/frontend/dist:ro
    networks:
      - sd_internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.core.entrypoints=web"
      - "traefik.http.services.core.loadbalancer.server.port=8000"
      # Apply auth middleware to all /api routes
      - "traefik.http.routers.core.middlewares=forward-auth@docker"
      # ForwardAuth middleware definition (defined once, referenced anywhere)
      - "traefik.http.middlewares.forward-auth.forwardauth.address=http://auth:8001/auth/verify"
      - "traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Role"

  vite:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: SD-vite_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env.dev
    environment:
      - VITE_AUTH_URL=http://auth:8001
      - VITE_API_URL=http://core:8000
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    command: npm run dev -- --host 0.0.0.0
    networks:
      - sd_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vite.rule=PathPrefix(`/`)"
      - "traefik.http.routers.vite.entrypoints=web"
      - "traefik.http.routers.vite.priority=1"      # lowest priority, catch-all
      - "traefik.http.services.vite.loadbalancer.server.port=5173"

networks:
  sd_internal:
    driver: bridge

volumes:
  postgres_data_dev:
  minio_data_dev: